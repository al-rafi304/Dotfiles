################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,preferred,auto,auto


###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = xfce4-terminal --hide-scrollbar
$browser = google-chrome-stable --profile-directory="Profile 2"
$browser-alt = google-chrome-stable --profile-directory="Default"
# $browser = brave --profile-directory="Profile 1"
# $browser-alt = brave --profile-directory="Profile 2"
$fileManager = thunar
$editor = subl
$menu = ~/.config/rofi/launchers/type-1/launcher.sh
$kill-menu = pkill rofi
$clipboard = rofi -modi clipboard:$HOME/.config/myscripts/cliphist/cliphist-rofi-img -show clipboard -theme $HOME/.config/rofi/launchers/type-2/style-1.rasi -show-icons
$powermenu = ~/.config/rofi/powermenu/type-2/powermenu.sh
$screenshot = ~/.config/myscripts/screenshot.sh
$screenrecord = ~/.config/myscripts/screenrecord.sh
$emoji = rofi -modi emoji -show emoji -theme $HOME/.config/rofi/launchers/type-2/style-2.rasi
$control-center = swaync-client -t

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
exec-once = waybar &
exec-once = swaybg -i ~/Pictures/Wallpapers/mountains-orange.jpg &
exec-once = thunar -d
exec-once = swaync &
# exec-once = systemctl --user start hyprpolkitagent
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --watch cliphist store -max-items 200
exec-once = /opt/DeskTime/DeskTime
exec-once = uxplay -vs 0 

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = HYPRCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


#####################
### LOOK AND FEEL ###
#####################

general { 
    gaps_in = 1
    gaps_out = 0

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors

col.active_border = rgba(89dcebee) rgba(282a36aa) 90deg
col.inactive_border = rgba(282a36aa)

    resize_on_border = true 
    extend_border_grab_area = 20
    hover_icon_on_border = true

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 10

    # Change transparency of focused and unfocused windows
    active_opacity = 1
    inactive_opacity = 1 #0.85

#    drop_shadow = false
#    shadow_range = 4
#    shadow_render_power = 3
#    col.shadow = rgba(1a1a1aee)

    blur {
        enabled = true
        size = 3
        passes = 3
        
        vibrancy = 0.1696
    }
}

animations {
    enabled = true

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default

    # Updated: Controls the special workspace animation to be vertical
    animation = specialWorkspace, 1, 6, myBezier, slidevert
}

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

master {
    new_status = master
}

misc { 
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}

plugin:darkwindow {
  # To modify the uniforms of an already existing shader, create a new shader and set the uniforms you want
  shader[tintRed] {
      from = tint
      args = tintColor=[1 0 0] tintStrength=0.1
  }

}



#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }

    numlock_by_default = true
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


####################
### KEYBINDINGSS ###
####################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, T, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen, 1
bind = $mainMod ALT, F, fullscreen
bindr = $mainMod, Space, exec, $kill-menu || $menu
bind = $mainMod, grave, exec, $control-center
bind = $mainMod CTRL, V, exec, $clipboard
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, U, togglesplit, # dwindle
bind = $mainMod, W, exec, $browser
bind = $mainMod SHIFT, W, exec, $browser-alt
bind = $mainMod, Q, exec, $powermenu
bind = $mainMod, Y, exec, $editor
bind = $mainMod, period, exec, $emoji
bind = $mainMod, I, exec, killall -SIGUSR1 waybar
bind = , Print, exec, $screenshot
bind = $mainMod, Print, exec, $screenshot --now
bind = $mainMod ALT, Print, exec, $screenrecord

# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d
bind = ALT, TAB, cyclenext
bind = ALTSHIFT, TAB, cyclenext, prev

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4

bind = $mainMod, TAB, workspace, e+1
bind = $mainMod SHIFT, TAB, workspace, e-1

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4


bind = $mainMod CTRL, j, movewindow, d
bind = $mainMod CTRL, k, movewindow, u
bind = $mainMod CTRL, h, movewindow, l
bind = $mainMod CTRL, l, movewindow, r

$resizeAmount = 30

bind = $mainMod ALT, j, resizeactive, 0 $resizeAmount
bind = $mainMod ALT, k, resizeactive, 0 -$resizeAmount
bind = $mainMod ALT, l, resizeactive, $resizeAmount 0
bind = $mainMod ALT, h, resizeactive, -$resizeAmount 0

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, hidden
bind = $mainMod, D, movetoworkspacesilent, special:hidden
bind = $mainMod SHIFT, D, movetoworkspace, 1


# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media binds
bindl = , XF86AudioLowerVolume, exec, ~/.config/myscripts/volume.sh --dec #wpctl set-volume @DEFAULT_AUDIO_SINK@ 4%-
bindl = , XF86AudioRaiseVolume, exec, ~/.config/myscripts/volume.sh --inc
bindl = , XF86AudioMute, exec, ~/.config/myscripts/volume.sh --toggle
bindl = , XF86AudioPlay, exec, playerctl play-pause -p spotify

# Function Binds

bindl = , XF86MonBrightnessDown, exec, ydotool key 59:1 59:0    #F1
bindl = , XF86MonBrightnessUp, exec, ydotool key 60:1 60:0      #F2
bindl = , XF86LaunchA, exec, ydotool key 61:1 61:0              #F3
bindl = , XF86LaunchB, exec, ydotool key 62:1 62:0              #F4
bindl = , XF86KbdBrightnessDown, exec, ydotool key 63:1 63:0    #F5
bindl = , XF86KbdBrightnessUp, exec, ydotool key 64:1 64:0      #F6
bindl = , XF86AudioPrev, exec, ydotool key 65:1 65:0            #F7


##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule = suppress_event maximize, match:class .* # You'll probably like this.
windowrule = float on, stay_focused on, match:class (Rofi)$
windowrule = float on, match:class (xfce-polkit)$

windowrule = workspace special:hidden, match:class (spotify)$
windowrule = float on, pin on, match:title (Picture-in-Picture)$

# windowrulev2 = bordercolor rgba(282a36aa) rgba(282a36aa)f,fullscreen:1
windowrule = border_size 0, rounding 0, match:fullscreen 1

workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0

layerrule = blur on, blur_popups on, ignore_alpha 0.5, match:namespace waybar
layerrule = blur on, ignore_alpha 0.5, match:namespace rofi
layerrule = blur on, ignore_alpha 0.5, match:namespace swaync-control-center
layerrule = blur on, ignore_alpha 0.5, match:namespace swaync-notification-window
